backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "기사 작성"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "레이아웃", name: "layout", widget: "hidden", default: "default"}
      - {label: "기사 제목", name: "title", widget: "string"}
      - {label: "카테고리", name: "category", widget: "select", options: ["PC/하드웨어", "게임", "디자인/그래픽"]}
      - {label: "본문 내용", name: "body", widget: "markdown"}
