<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "My News Blog" }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; background-color: #f4f4f4; color: #333; }
        a { text-decoration: none; color: inherit; }
        header { background-color: #fff; border-bottom: 2px solid #000; padding: 20px 0; text-align: center; }
        header h1 { font-size: 2.5rem; font-weight: bold; }
        nav { margin-top: 15px; }
        nav a { margin: 0 15px; font-weight: bold; color: #555; }
        .container { width: 90%; max-width: 900px; margin: 30px auto; background: #fff; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .article-header { border-bottom: 2px solid #d32f2f; padding-bottom: 15px; margin-bottom: 20px; }
        .article-category { background: #000; color: #fff; padding: 3px 8px; font-size: 0.8rem; font-weight: bold; }
        .article-title { font-size: 2rem; margin-top: 10px; }
        .article-content h2 { margin-top: 25px; margin-bottom: 10px; border-left: 4px solid #d32f2f; padding-left: 10px; }
        .article-content p { margin-bottom: 15px; font-size: 1.05rem; }
        .article-content ul { margin-left: 20px; margin-bottom: 15px; }
        footer { background-color: #333; color: #fff; text-align: center; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">My News Blog</a></h1>
        <nav>
            <a href="/jypcomputer/">홈</a>
            <a href="/jypcomputer/">PC/하드웨어</a>
            <a href="/jypcomputer/">게임</a>
            <a href="/jypcomputer/">디자인/그래픽</a>
        </nav>
    </header>

    <div class="container">
        <article>
            <div class="article-header">
                {% if page.category %}<span class="article-category">{{ page.category }}</span>{% endif %}
                <h1 class="article-title">{{ page.title }}</h1>
            </div>
            <!-- 마크다운으로 쓴 글 내용이 이 자리에 자동으로 들어갑니다 -->
            <div class="article-content">
                {{ content }}
            </div>
        </article>
    </div>

    <footer>
        <p>&copy; 2026 My News Blog. All rights reserved.</p>
    </footer>

</body>
</html>
